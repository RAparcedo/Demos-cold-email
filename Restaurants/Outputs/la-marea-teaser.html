<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Marea — Seafood Restaurant Tenerife</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Lato', sans-serif; }
    .playfair { font-family: 'Playfair Display', serif; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .anim-label  { animation: fadeIn 0.7s ease both; animation-delay: 0.15s; }
    .anim-title  { animation: fadeInUp 0.8s ease both; animation-delay: 0.3s; }
    .anim-tagline{ animation: fadeInUp 0.8s ease both; animation-delay: 0.5s; }
    .anim-cta    { animation: fadeInUp 0.7s ease both; animation-delay: 0.7s; }
    .anim-cards  { animation: fadeIn 0.6s ease both; animation-delay: 0.9s; }

    .card-1 { animation: slideUp 0.6s ease both; animation-delay: 1.0s; }
    .card-2 { animation: slideUp 0.6s ease both; animation-delay: 1.1s; }
    .card-3 { animation: slideUp 0.6s ease both; animation-delay: 1.2s; }
  </style>
</head>
<body class="bg-[#0a1a1f] overflow-x-hidden">

  <!-- HERO -->
  <section class="relative min-h-screen flex flex-col">

    <!-- Background image -->
    <img
      src="https://images.unsplash.com/photo-1559339352-11d035aa65de?w=1600&q=80"
      alt="Fresh seafood platter"
      class="absolute inset-0 w-full h-full object-cover object-center"
    />

    <!-- Overlay: dark at top and bottom, slightly lighter in the middle so food glows -->
    <div class="absolute inset-0 bg-gradient-to-b from-black/70 via-black/45 to-black/85"></div>

    <!-- Hero content -->
    <div class="relative z-10 flex flex-col items-center justify-center flex-1 text-center px-6 pt-24 pb-6">

      <!-- Cuisine label -->
      <span class="anim-label inline-block lato tracking-[0.3em] text-[#7ecfc0] text-xs md:text-sm uppercase mb-5 font-light border border-[#7ecfc0]/40 px-4 py-1.5 rounded-full">
        Fresh Seafood &amp; Canarian Cuisine
      </span>

      <!-- Restaurant name -->
      <h1 class="anim-title playfair text-white font-bold text-5xl sm:text-6xl md:text-8xl leading-tight drop-shadow-lg">
        La Marea
      </h1>

      <!-- Tagline -->
      <p class="anim-tagline playfair italic text-white/75 text-lg sm:text-xl md:text-2xl mt-4 max-w-xs md:max-w-lg leading-relaxed">
        Where the Atlantic meets the table.
      </p>

      <!-- CTA -->
      <div class="anim-cta mt-8">
        <a
          href="#"
          class="inline-block bg-[#D4A647] hover:bg-[#e0b55a] text-black font-bold text-sm md:text-base px-8 py-4 rounded-full tracking-widest uppercase transition-colors duration-300"
        >
          Reserve a Table
        </a>
      </div>
    </div>

    <!-- Dish cards -->
    <div class="relative z-10 w-full px-4 pb-8">
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 max-w-2xl mx-auto">

        <div class="card-1 bg-white/8 backdrop-blur-sm border border-white/10 rounded-xl px-5 py-4 text-center">
          <p class="playfair text-white font-semibold text-base">Pulpo a la Brasa</p>
          <p class="text-white/55 text-xs mt-1 leading-relaxed">Grilled octopus, charred edges, mojo verde</p>
        </div>

        <div class="card-2 bg-white/8 backdrop-blur-sm border border-white/10 rounded-xl px-5 py-4 text-center">
          <p class="playfair text-white font-semibold text-base">Vieja al Sal</p>
          <p class="text-white/55 text-xs mt-1 leading-relaxed">Salt-crusted parrotfish, lemon &amp; herbs</p>
        </div>

        <div class="card-3 bg-white/8 backdrop-blur-sm border border-white/10 rounded-xl px-5 py-4 text-center">
          <p class="playfair text-white font-semibold text-base">Gambas al Ajillo</p>
          <p class="text-white/55 text-xs mt-1 leading-relaxed">Sizzling prawns, garlic, guindilla, pan tostado</p>
        </div>

      </div>
    </div>

  </section>

</body>
</html>

<!-- PITCH NOTES
  • Most seafood restaurants in Tenerife have cluttered websites with tiny text and stock photos that could be from anywhere — this page puts your actual dishes front and centre, making visitors hungry before they've even read a word.
  • The single "Reserve a Table" button removes all friction: no hunting through tabs or scrolling past walls of text. On mobile (where most tourists browse), this converts far better than a traditional site.
  • The name La Marea and the tagline "Where the Atlantic meets the table" position the restaurant as a destination, not just a place to eat — that's the kind of identity that gets shared on Instagram and earns word-of-mouth bookings.
-->
